<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/svg+xml" href="pictures/bentSword.svg">
    <title>What Do You Want?</title>
	
	<meta name="description" content="A tool to visualize what global funding—like the cost of war or wealth taxes—could provide for healthcare, education, and the environment.">
	<meta property="og:site_name" content="What Do You Want?">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://b-ricked.github.io/what-do-you-want/">
	<meta property="og:title" content="What Do You Want? - Funding Trade-off Calculator">
	<meta property="og:description" content="Calculate what billions in funding could build. Compare the cost of war to hospitals, childcare, forest restoration, etc.">
	<meta property="og:image" content="https://b-ricked.github.io/what-do-you-want/pictures/OG.png">
	<meta property="twitter:card" content="summary_large_image">

<style>
		/* LAYOUT & THEMING 
		*/
		* {box-sizing: border-box;}

		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center; 
			min-height: 100vh;       
			margin: 0;
			padding: 40px 20px; 
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			text-align: center;
			/* Default Light Colors */
			background-color: #f9f9f9;
			color: #333;
			transition: background-color 0.3s, color 0.3s;
		}

		/* AUTOMATIC DARK MODE 
		   This section only activates if the user's browser/system is set to Dark Mode.
		*/
		@media (prefers-color-scheme: dark) {
			body { background-color: #121212; color: #e0e0e0; }
			h1, .section-header strong { color: #ffffff; }
			.inline-dropdown, .nav-dropdown { background-color: #2c2c2c; color: #ffffff; border: 1px solid #555; }
			.custom-tooltip { background: #e0e0e0; color: #121212; }
			footer { border-top: 1px solid #333 !important; }
			a { color: #64b5f6 !important; }
		}

		/* The Bold Summary Sentence generated by JS */
		.section-header strong {
			font-size: 1.4rem;  
			line-height: 1.3;   
			display: inline-block; 
			margin-bottom: 10px; 
		}

		/* Results List */
		ul { list-style-type: none; padding: 0; margin: 0 auto; }
		li { margin-bottom: 8px; font-size: 1.1rem; }

		/* Dropdown Styling */
		.inline-dropdown {
			font-size: 2rem;
			font-weight: bold;
			border: 1px solid #bbb;
			border-radius: 6px;
			cursor: pointer;
			padding: 4px 8px;
		}
		
		.nav-dropdown {
			padding: 8px;
			font-size: 1.25rem;
			font-weight: bold;
			margin-bottom: 22px;
			cursor: pointer;
			border-radius: 6px;
			border: 1px solid #bbb;
		}

		/* The Big Image at the bottom */
		#dynamicImage {
			display: block;
			margin: 0px auto; /* Removed extra vertical margin */
			max-width: 80%;
			height: auto;             
			border-radius: 8px;
			opacity: 0;               
			transition: opacity 0.6s ease-in-out;
		}
		.image-visible { opacity: 1 !important; }

		/* Custom Mouse Tooltip */
		.custom-tooltip {
			position: fixed;
			padding: 8px 12px;
			background: #2c3e50;
			color: white;
			border-radius: 6px;
			font-size: 0.85rem;
			pointer-events: none;
			opacity: 0;
			transition: opacity 0.1s ease;
			z-index: 9999;
			white-space: nowrap;
		}
</style>
</head>

<body>
	<div id="tooltip" class="custom-tooltip"></div>

	<h1>What could we have
        <select class="inline-dropdown" id="costSelector" onchange="updatePage()" title="Change the source of funding">
            <option value="War">instead of war?</option>
            <option value="PAC">instead of super-PACs?</option>
            <option value="tax">with a wealth tax?</option>					
        </select>
    </h1> 

	<select class="nav-dropdown" id="careSelector" onchange="updatePage()" title="Choose a category to see the impact">
        <option value="" disabled selected>What do you care about?</option>
        <option value="hospitals">Hospitals</option>
        <option value="healthCare">Health Care</option>
        <option value="childcare">Child Care</option>
        <option value="animals">Animals</option>
        <option value="environment">Environment</option>
        <option value="elderly">Elderly Care</option>
    </select>

    <div class="content">
		<div id="dynamic-content-section" class="content-section" style="display:none;"></div>
	</div>
	
    <div style="margin-top: 35px; margin-bottom: 13px;">
		<button id="shareButton" onclick="copyResults()" style="display:none;" title="Copies results to your clipboard for easy social media sharing!">
			Copy & Share These Results 🔗
		</button>
	</div>

    <div style="margin-top: 10px; min-height: 20px;">
		<a id="imageSourceLink" href="#" target="_blank" title="View the data source" style="color: #7f8c8d; font-size: 0.85rem; text-decoration: underline; display: none; line-height: 1.2;" ></a>
	</div>
	<div style="margin-top: 0px; min-height: auto; margin-bottom: 5px;"> 
		<img id="dynamicImage" src="pictures/costOfWar.png" alt="Visual Representation"> 
	</div>

    <footer style="margin-top: 0px; padding: 0; border-top: 1px solid #ddd; width: 100%; max-width: 600px;">
		<p style="margin-top: 5px;"> 
		   <a href="pages/sources.html">Sources</a> - <a href="pages/support.html">Feedback</a> - <a href="https://www.buymeacoffee.com/cO7F3F62po" target="_blank">Support</a> - <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">Complaints</a>
		</p>
	</footer>
	
<script>
	/* DEVELOPER'S DATA DICTIONARY 
	*/

	/* FUNDING DATA
	   fund: The raw dollar amount.
	   measure: Used for the "Every additional [day/cycle/year]" sentence.
	   img: The local path to the image for that source.
	*/
    const fundingData = {
        War: { fund: 2000000000, message: "1 day of war", measure: "day", img: "pictures/costOfWar.png", linkUrl: "https://example.com", linkText: "Source: CSIS" },
        PAC: { fund: 5000000000, message: "1 campaign cycle", measure: "cycle", img: "pictures/PAC.png", linkUrl: "https://example.com", linkText: "Source: OpenSecrets" },
        tax: { fund: 442000000000, message: "1 year of wealth tax", measure: "year", img: "pictures/wealthTax.png", linkUrl: "https://example.com", linkText: "Source: Senate Proposals" }
    };

	/* CATEGORY DATA
	   To add a new one, copy a "standard" block.
	   cost: Building/Infrastructure cost per unit.
	   staff: Number of people hired per unit.
	   sal: Yearly salary for those people.
	   cap: Number of people/animals served per unit.
	*/
    const categoryData = {
        hospitals: { type: 'standard', cost: 50000000, staff: 200, sal: 83000, cap: 50, isMillion: false, buildText: "new hospitals", verbCap: "Providing", capText: "hospital beds", staffText: "medical professionals" },
        childcare: { type: 'standard', cost: 1100000, staff: 7, sal: 32000, cap: 70, isMillion: false, buildText: "daycare centers", verbCap: "Serving", capText: "children", staffText: "workers" },
        animals: { type: 'standard', cost: 1000000, staff: 8, sal: 30000, cap: 1500, isMillion: true, buildText: "animal shelters", verbCap: "Serving", capText: "million animals", staffText: "shelter workers" },
        elderly: { type: 'standard', cost: 12000000, staff: 40, sal: 45000, cap: 80, isMillion: false, buildText: "elderly facilities", verbCap: "Housing", capText: "seniors", staffText: "caregivers" },
        environment: { type: 'environment' }, // Uses custom math in buildEnvironmentHTML
        healthCare: { type: 'healthCare' }   // Uses custom math in buildHealthCareHTML
    };

	/* CORE LOGIC 
	*/

    function updatePage() {
		const costSelector = document.getElementById('costSelector');
		const careSelector = document.getElementById('careSelector');
		
		// Run the dropdown resizer
		resizer(costSelector);
		resizer(careSelector);
		
        const displayImg = document.getElementById('dynamicImage');
		const sourceLink = document.getElementById('imageSourceLink');
        const contentContainer = document.getElementById('dynamic-content-section');
        const currentSource = fundingData[costSelector.value];

		// Update Image & Source Link
        displayImg.src = currentSource.img;
        sourceLink.href = currentSource.linkUrl;
        sourceLink.innerHTML = currentSource.linkText;

		if (!careSelector.value) return;

		// Show Results Elements
        document.getElementById('shareButton').style.display = "inline-block";
        displayImg.classList.add('image-visible');
        sourceLink.style.display = "inline-block"; 
        contentContainer.style.display = "block";

        const currentCare = categoryData[careSelector.value];
        let generatedHTML = "";

		// Decide which math function to use
        if (currentCare.type === 'standard') generatedHTML = buildStandardHTML(currentSource.fund, currentSource.message, currentSource.measure, currentCare);
        else if (currentCare.type === 'environment') generatedHTML = buildEnvironmentHTML(currentSource.fund, currentSource.message);
        else if (currentCare.type === 'healthCare') generatedHTML = buildHealthCareHTML(currentSource.fund, currentSource.message);

        contentContainer.innerHTML = generatedHTML;
        document.activeElement.blur(); // Fix for mobile tooltip behavior
    }

	// Standard calculation: Units = Money / (Cost + (Staff * Salary))
    function buildStandardHTML(fund, message, measure, careData) {
		let unitTotal = careData.cost + (careData.staff * careData.sal);
		let built = Math.floor(fund / unitTotal);
        let builtStr = built >= 1 ? built.toLocaleString() : "0 (partial coverage)";
        let capStr = careData.isMillion ? ((built * careData.cap) / 1000000).toFixed(2) : (built * careData.cap).toLocaleString();

        return `<p class="section-header"><strong>${message} could build ${builtStr} ${careData.buildText} and staff them for a year.</strong></p>
                <ul><li>${careData.verbCap} ${capStr} ${careData.capText}.</li><li>Employing ${(built * careData.staff).toLocaleString()} ${careData.staffText}.</li><li>Every additional ${measure} could pay those salaries for ${Math.floor(fund / (built * careData.staff * careData.sal)).toLocaleString()} more years.</li></ul>`;
	}

	function buildEnvironmentHTML(fund, message) {
		let totalTrees = fund / 2;
		let acres = Math.round(totalTrees / 500);
		// This adds the Square Miles calculation
		let sqMiles = (acres / 640).toLocaleString(undefined, {maximumFractionDigits: 0});
			
		// This changes the tree display to use your existing formatBigNumber function
		return `<p class="section-header"><strong>${message} could plant ${formatBigNumber(totalTrees)} trees.</strong></p>
				<ul>
					<li>Restoring ${acres.toLocaleString()} acres of forest.</li>
					<li>That is ${sqMiles} square miles of trees.</li>
				</ul>`;
	}
	function formatBigNumber(num) {
        if (num >= 1000000000) return (num / 1000000000).toFixed(1) + " Billion";
        if (num >= 1000000) return (num / 1000000).toFixed(1) + " Million";
        return num.toLocaleString();
    }

    function buildHealthCareHTML(fund, message) {
		let medicare = Math.round(fund / (185 * 12)).toLocaleString();
		let privateIns = Math.round(fund / (450 * 12)).toLocaleString();
		return `<p class="section-header"><strong>${message} could cover Medicare for ${medicare} people<br>or Private Insurance for ${privateIns} people.</strong></p>`;
	}

	/* UTILITY FUNCTIONS 
	*/

	// Compression fix for social media: replaces newlines with dots
	function copyResults() {
		const activeSection = document.getElementById('dynamic-content-section');
		let compressedText = activeSection.innerText.trim().replace(/\n+/g, ' • ');
		const shareString = `💡 Did you know? ${compressedText}\n\nCheck the math: https://b-ricked.github.io/what-do-you-want/`;
		
		navigator.clipboard.writeText(shareString).then(() => {
			const btn = document.getElementById('shareButton');
			btn.innerText = "Results Copied! ✅";
			setTimeout(() => { btn.innerText = "Copy & Share These Results 🔗"; }, 4000);
		});
	}

	// Dynamic Dropdown width adjuster
	function resizer(el) {
		const tempSpan = document.createElement("span");
		tempSpan.style.visibility = "hidden"; tempSpan.style.position = "absolute"; tempSpan.style.whiteSpace = "pre";
		tempSpan.style.font = window.getComputedStyle(el).font;
		tempSpan.innerText = el.options[el.selectedIndex].text;
		document.body.appendChild(tempSpan);
		el.style.width = (tempSpan.offsetWidth + 40) + "px";
		document.body.removeChild(tempSpan);
	}

    window.onload = () => { updatePage(); };

	/* TOOLTIP LOGIC */
	const tooltip = document.getElementById('tooltip');
    if (window.matchMedia("(hover: hover)").matches) {
        document.addEventListener('mousemove', (e) => {
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        });
        document.addEventListener('mouseover', (e) => {
            const target = e.target.closest('[title], [data-title]');
            if (target) {
                const text = target.getAttribute('title') || target.getAttribute('data-title');
                target.setAttribute('data-title', text);
                target.removeAttribute('title');
                tooltip.innerText = text;
                tooltip.style.opacity = '1';
            }
        });
        document.addEventListener('mouseout', () => { tooltip.style.opacity = '0'; });
    }
</script>
</body>
</html>
