<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/svg+xml" href="pictures/bentSword.svg">
    <title>What Do You Want?</title>
	
	<meta name="description" content="A tool to visualize what global funding—like the cost of war or wealth taxes—could provide for healthcare, education, and the environment.">
	<meta property="og:site_name" content="What Do You Want?">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://b-ricked.github.io/what-do-you-want/">
	<meta property="og:title" content="What Do You Want? - Funding Trade-off Calculator">
	<meta property="og:description" content="Calculate what billions in funding could build. Compare the cost of war to hospitals, childcare, forest restoration, etc.">
	<meta property="og:image" content="https://b-ricked.github.io/what-do-you-want/pictures/OG.png">
	<meta property="twitter:card" content="summary_large_image">

<style>
		/* LAYOUT & THEMING 
		*/
		* {box-sizing: border-box;}

		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center; 
			min-height: 100vh;       
			margin: 0;
			padding: 40px 20px; 
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			text-align: center;
			/* Default Light Colors */
			background-color: #f9f9f9;
			color: #333;
			transition: background-color 0.3s, color 0.3s;
		}

		/* AUTOMATIC DARK MODE 
		   This section only activates if the user's browser/system is set to Dark Mode.
		*/
		@media (prefers-color-scheme: dark) {
			body { background-color: #3C3C3C; color: #e0e0e0; }
			h1, .section-header strong { color: #ffffff; }
			.inline-dropdown, .nav-dropdown { background-color: #2c2c2c; color: #ffffff; border: 1px solid #555; }
			.custom-tooltip { background: #e0e0e0; color: #121212; }
			footer { border-top: 1px solid #333 !important; }
			a { color: #64b5f6 !important; }
		}

		/* The Bold Summary Sentence generated by JS */
		.section-header strong {
			font-size: 1.4rem;  
			line-height: 1.3;   
			display: inline-block; 
			margin-bottom: 0px; 
		}

		/* Results List */
		ul { list-style-type: none; padding: 0; margin: 0 auto; }
		li { margin-bottom: 8px; font-size: 1.1rem; }

		/* Dropdown Styling */
		.inline-dropdown {
			font-size: 2rem;
			font-weight: bold;
			border: 1px solid #bbb;
			border-radius: 6px;
			cursor: pointer;
			padding: 4px 8px;
			max-width: 90vw;
			
		}
		
		.nav-dropdown {
			padding: 8px;
			font-size: 1.25rem;
			font-weight: bold;
			margin-bottom: 22px;
			cursor: pointer;
			border-radius: 6px;
			border: 1px solid #bbb;
			max-width: 90vw;
		}

		.inline-dropdown option, .nav-dropdown option {
			/* 1. Makes the wording smaller than the main box */
			font-size: 1rem; 
			
			/* 2. Standard weight so it's not as "heavy" as the header */
			font-weight: normal; 
			
			/* 3. Centers the text in the list (supported in most modern browsers) */
			text-align: left;
			
			
		}
		

		/* The Big Image at the bottom */
		#dynamicImage {
			display: block;
			margin: 0 auto;
			
			/* Force every image to the same height and width */
			max-height: 42vh; 
			max-width: 42vw; 

			/* 2. Set dimensions to auto so the box matches the image pixels */
			height: auto;
			width: auto;
			
			/* CRITICAL: This prevents the image from looking "squished" or "stretched" */
			/* It will crop the edges slightly if the aspect ratio doesn't match */
			object-fit: contain; 
			
			/* Keeps the image centered within the forced dimensions */
			object-position: center;

			border-radius: 8px;
			opacity: 0;               
			transition: opacity 0.6s ease-in-out;
			background-color: transparent; /* Optional: adds a consistent backdrop if 'contain' shows gaps */
		}
		.image-visible { opacity: 1 !important; }

		/* Custom Mouse Tooltip */
		.custom-tooltip {
			position: fixed;
			padding: 8px 12px;
			background: #2c3e50;
			color: white;
			border-radius: 6px;
			font-size: 0.85rem;
			pointer-events: none;
			opacity: 0;
			transition: opacity 0.1s ease;
			z-index: 9999;
			white-space: nowrap;
		}
		#shareButton {
			padding: 15px 30px;
			font-size: 1.2rem;
			font-weight: bold;
			color: white;
			background-color: #2c3e50; /* Match your tooltip color */
			border: none;
			border-radius: 8px;
			cursor: pointer;
			transition: transform 0.2s, background-color 0.2s;
			box-shadow: 0 4px 6px rgba(0,0,0,0.1);
		}

		#shareButton:hover {
			background-color: #34495e;
			transform: scale(1.05); /* Slight "pop" on hover */
		}

		#shareButton:active {
			transform: scale(0.98);
		}

		/* Mobile-specific adjustment */
		@media (max-width: 600px) {
			.inline-dropdown {
				font-size: 1.1rem; /* Much more manageable on a phone */
				margin-top: 10px;
				margin-bottom:0px;
				padding: 12px 0px;
				text-align-last: center;
				
			}
			.nav-dropdown {
				font-size: 1.1rem; /* Much more manageable on a phone */
				margin-top: 0px;
				margin-bottom: 20px;
				padding: 12px 0px;
				text-align-last: center;
				
			}

			.inline-dropdown option, .nav-dropdown option {
				font-size: 0.9rem; /* Smaller font is the best 'wrap' alternative for mobile */
			}
			
			h1 {
				font-size: 1.5rem; /* Keeps the heading proportional to the dropdown */
			}

			#dynamicImage {
				/* Force every image to the same height and width */
				max-height: 69vh; 
				max-width: 90vw; 

				/* 2. Set dimensions to auto so the box matches the image pixels */
				height: auto;
				width: auto;
				
				/* CRITICAL: This prevents the image from looking "squished" or "stretched" */
				/* It will crop the edges slightly if the aspect ratio doesn't match */
				object-fit: contain;
			}
		}
</style>
</head>

<body>
	<div id="tooltip" class="custom-tooltip"></div>

	<h1>What could we have
        <select class="inline-dropdown" id="costSelector" onchange="updatePage()" title="Choose a funding source to see what could be done instead"></select>
    </h1> 

	<select class="nav-dropdown" id="careSelector" onchange="updatePage()" title="Choose a category to see the impact">
    </select>

    <div class="content">
		<div id="dynamic-content-section" class="content-section" style="display:none;"></div>
	</div>
	
    <div style="margin-top: 35px; margin-bottom: 35px;">
		<button id="shareButton" onclick="copyResults()" style="display:none;" title="Copies results to your clipboard for easy social media sharing!">
			Copy & Share These Results 🔗
		</button>
	</div>

    <div style="margin-top: 10px; min-height: 20px;">
		<a id="imageSourceLink" href="#" target="_blank" title="View the data source" style="color: #7f8c8d; font-size: 0.95rem; text-decoration: underline; display: none; line-height: 1.2;" ></a>
	</div>
	<div style="margin-top: 5px; min-height: auto; margin-bottom: 5px;"> 
		<img id="dynamicImage" src="pictures/costOfWar.png" alt="Visual Representation"> 
	</div>

    <footer style="margin-top: 0px; margin-bottom: 0px; padding: 0; border-top: 1px solid #b1b1b1; width: 100%; max-width: 600px;">
    <p style="margin-top: 8px; margin-bottom: 8px;"> 
       <a href="pages/sources.html" title="View our data citations">Sources</a> - 
       <a href="pages/support.html" title="What do you think we should add/ what could we do better">Feedback</a> - 
       <a href="https://www.buymeacoffee.com/cO7F3F62po" target="_blank" title="Support us">Buy Me a Coffee</a> - 
       <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" title="Submit a complaint">Complaints</a>
    </p>
	
	<P style= "margin-top: 0px; font-size: 0.75rem; color: #b1b1b1;"> This site has no affiliation with anyone. There is no profit unless you buy me a coffee.</p> 
	</footer>
	
<script>
	let fundingData = {};
	let categoryData = {};
	let specialData = {};

	async function loadData() {
		try {
			// 1. Fetch the raw text from your CSV files
			const [fundRes, catRes, specRes] = await Promise.all([
				fetch('data/funding.csv'),
				fetch('data/categories.csv'),
				fetch('data/special.csv')
			]);

			// 2. Parse that text into our objects
			parseCSV(await fundRes.text(), 'funding');
			parseCSV(await catRes.text(), 'category');
			// Use the new custom parser for the special file
			parseSpecialCSV(await specRes.text());

			// 3. Now that data is ready, build the dropdowns and show the page
			buildDropdowns();
			updatePage();
		} catch (err) {
			console.error("CSV Load Error: Make sure you are using 'Go Live'!", err);
		}
	}

	// This helper function splits the CSV text into rows and columns
	function splitCSVRow(row) {
		const cells = [];
		let current = "";
		let inQuotes = false;

		for (let i = 0; i < row.length; i++) {
			const char = row[i];

			if (char === '"') {
				if (inQuotes && row[i + 1] === '"') {
					current += '"';
					i++; // skip escaped quote
				} else {
					inQuotes = !inQuotes;
				}
			} else if (char === ',' && !inQuotes) {
				cells.push(current);
				current = "";
			} else {
				current += char;
			}
		}

		cells.push(current);
		return cells;
	}

	function parseCSV(text, type) {
		const lines = text.trim().split("\n");
		const headers = splitCSVRow(lines[0]).map(h => h.trim());
		
		for (let i = 1; i < lines.length; i++) {
			const cols = splitCSVRow(lines[i]);
			if (cols.length < headers.length) continue;

			const key = cols[0].trim();
			const obj = {};
			for (let j = 1; j < headers.length; j++) {
				let val = cols[j].trim();

				// Normalize currency/number formatting so these can be used in math operations.
				const numericText = val.replace(/[$,]/g, "").trim();
				if (numericText !== "" && !isNaN(numericText)) {
					obj[headers[j]] = Number(numericText);
				} else {
					obj[headers[j]] = val;
				}
			}

			if (type === 'funding') fundingData[key] = obj;
			else if (type === 'category') categoryData[key] = obj;
			else if (type === 'special') specialData[key] = obj;
		}
	}

	function parseSpecialCSV(text) {
		const rows = text.split(/\r?\n/);

		rows.forEach(row => {
			if (!row.trim()) return; 
			const cells = splitCSVRow(row);

			let currentKey = null;
			let currentLabel = null;
			let instructions = [];

			for (let i = 0; i < cells.length; i++) {
				const cell = cells[i].trim().toLowerCase();

				if ((cell === 'key' || cell === '_key') && i + 1 < cells.length) {
					currentKey = cells[++i].trim();
				} 
				else if (cell === 'label' && i + 1 < cells.length) {
					currentLabel = cells[++i].trim();
				} 
				else if (cell === 'txt' && i + 1 < cells.length) {
					instructions.push({ type: 'txt', val: cells[++i].trim() });
				} 
				else if (cell === 'mult' && i + 1 < cells.length) {
					const num = parseFloat(cells[++i].trim());
					if (!isNaN(num)) instructions.push({ type: 'mult', val: num });
				} 
				else if (cell === 'measure') {
					instructions.push({ type: 'measure' });
				} 
				else if (cell === 'msg') {
					instructions.push({ type: 'msg' });
				} 
				else if (cell === 'bp') {
					instructions.push({ type: 'bp' });
				} 
				else if (cell === 'end') {
					break; 
				}
			}

			// Store the blueprint in specialData using the key we found
			if (currentKey) {
				specialData[currentKey] = {
					label: currentLabel || currentKey,
					instructions: instructions
				};
			}
		});
	}
	/* CORE LOGIC 
	*/
	

	function buildDropdowns() {
		const fSel = document.getElementById('costSelector');
		const cSel = document.getElementById('careSelector');

		// Clear any existing hardcoded options
		fSel.innerHTML = "";
		cSel.innerHTML = "";

		// 1. Fill Funding Dropdown (War, PACs, etc.)
		for (let key in fundingData) {
			// Use the 'label' from CSV, or the message if label is missing
			let opt = new Option(fundingData[key].label || fundingData[key].message, key);
			// This attaches the tooltip info from your CSV
			opt.title = fundingData[key].linkText || "Source information";
			fSel.add(opt);
		}

		// 2. Add the "Placeholder" for the Care Selector
		let placeholder = new Option("What do you care about?", "");
		placeholder.disabled = true;
		placeholder.selected = true;
		cSel.add(placeholder);

		// 3. Fill Category Dropdown (Hospitals, Environment, etc.)
		// We combine categoryData and specialData into this one list
		for (let key in categoryData) {
			let opt = new Option(categoryData[key].label || key, key);
			opt.title = categoryData[key].sourceNote || "View data sources in footer";
			cSel.add(opt);
		}
		
		for (let key in specialData) {
			let opt = new Option(specialData[key].label || key, key);
			opt.title = specialData[key].sourceNote || "Special calculation";
			cSel.add(opt);
		}
	}

    function updatePage() {
		const costSel = document.getElementById('costSelector');
		const careSel = document.getElementById('careSelector');
		resizer(costSel); resizer(careSel);
		
		const source = fundingData[costSel.value];
		const careKey = careSel.value;
		const content = document.getElementById('dynamic-content-section');
		const img = document.getElementById('dynamicImage');

		if (!source || !careKey) return;

		// 1. Update Image
		img.src = source.img;
		img.classList.add('image-visible');
		content.style.display = "block";

		// Update the source link above the image
		const linkEl = document.getElementById('imageSourceLink');
		if (source.linkUrl && source.linkText) {
			linkEl.href = source.linkUrl;
			linkEl.innerHTML = source.linkText;
			linkEl.style.display = "block";
		} else {
			linkEl.style.display = "none";
		}

		document.getElementById('shareButton').style.display = "inline-block";

		// 2. Decide which "Math Engine" to use
		if (categoryData[careKey]) {
			// Use the Standard Engine (Hospitals, etc.)
			content.innerHTML = buildStandardHTML(source.fund, source.message, categoryData[careKey], careKey);
		} else if (specialData[careKey]) {
			// Use the NEW "Control Everything" Engine
			content.innerHTML = buildSpecialHTML(source, specialData[careKey]);
		}
		
		document.activeElement.blur(); 
	}

	// Standard calculation: Units = Money / (Cost + (Staff * Salary))
	function buildStandardHTML(fund, message, careData, key) {
		let unitTotal = careData.cost + (careData.staff * (careData.sal || 0));
		let built = Math.floor(fund / unitTotal);
		
		// Use your formatter for the capacity (people served, animals rescued, etc.)
		let capNum = built * careData.cap;
		let capStr = formatBigNumber(capNum);

		// Use your formatter for the total jobs created
		let staffCount = formatBigNumber(built * careData.staff);

		return `
			<p class="section-header"><strong>${message} could build ${built.toLocaleString()} ${careData.buildText} and staff them for a year.</strong></p>
			<ul>
				<li>${careData.verbCap} ${capStr} ${careData.capText}.</li>
				<li>Employing ${staffCount} ${careData.staffText}.</li>
			</ul>`;
	}

	function buildSpecialHTML(source, s) {
		let html = `<p class="section-header"><strong>`;
		let inList = false; // Tracks if we have hit a 'bp' yet

		s.instructions.forEach(inst => {
			if (inst.type === 'txt') {
				html += inst.val;
			} 
			else if (inst.type === 'mult') {
				// Multiply by funding and format the number
				const result = Math.round(source.fund * inst.val);
				const formattedResult = formatBigNumber(result);
				html += " " + formattedResult + " ";
			} 
			else if (inst.type === 'measure') {
				// Assumes your funding.csv has a column header named 'measure'
				html +=" "+ (source.measure || "")+" ";
			} 
			else if (inst.type === 'msg') {
				html += (source.message || "")+" ";
			} 
			else if (inst.type === 'bp') {
				if (!inList) {
					// First bullet point: close the paragraph and open the list
					html += `</strong></p><ul><li>`;
					inList = true;
				} else {
					// Subsequent bullet points: close previous list item and open a new one
					html += `</li><li>`;
				}
			}
		});

		// Clean up the closing HTML tags based on whether we created a list
		if (inList) {
			html += `</li></ul>`;
		} else {
			html += `</strong></p>`;
		}

		return html;
	}

	function formatBigNumber(num) {
        if (num >= 1000000000) return (num / 1000000000).toFixed(1).replace(/\.0$/, "") + " billion";
        if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, "") + " million";;
        return num.toLocaleString();
    }

    /* UTILITY FUNCTIONS 
	*/

	// Compression fix for social media: replaces newlines with dots
	function copyResults() {
		const activeSection = document.getElementById('dynamic-content-section');
		let compressedText = activeSection.innerText.trim().replace(/\n+/g, ' • ');
		const shareString = `💡 Did you know? ${compressedText}\n\nSource: https://b-ricked.github.io/what-do-you-want/`;
		
		navigator.clipboard.writeText(shareString).then(() => {
			const btn = document.getElementById('shareButton');
			btn.innerText = "Results Copied! ✅";
			setTimeout(() => { btn.innerText = "Copy & Share These Results 🔗"; }, 4000);
		});
	}

	// Dynamic Dropdown width adjuster
	function resizer(el) {
		const tempSpan = document.createElement("span");
		tempSpan.style.visibility = "hidden"; 
		tempSpan.style.position = "absolute"; 
		tempSpan.style.whiteSpace = "pre";
		tempSpan.style.font = window.getComputedStyle(el).font;
		tempSpan.innerText = el.options[el.selectedIndex].text;
		document.body.appendChild(tempSpan);

		// Get the raw width
    	let targetWidth = tempSpan.offsetWidth + 40;

		const maxWidth = window.innerWidth * 0.9;
		if (targetWidth > maxWidth) {
			targetWidth = maxWidth;
		}
		el.style.width = targetWidth + "px";
		document.body.removeChild(tempSpan);
	}

    

	/* TOOLTIP LOGIC */
	const tooltip = document.getElementById('tooltip');

	// Only initialize tooltips if the device has a mouse/hover capability
	if (window.matchMedia("(hover: hover)").matches) {
		document.addEventListener('mousemove', (e) => {
			tooltip.style.left = (e.clientX + 15) + 'px';
			tooltip.style.top = (e.clientY + 15) + 'px';
		});

		// NEW: Hide tooltip on click
        document.addEventListener('click', () => { 
            tooltip.style.opacity = '0'; 
        });

		document.addEventListener('mouseover', (e) => {
			// 1. Look for either the 'title' OR our custom 'data-title'
			const target = e.target.closest('[title], [data-title]');
			
			if (target) {
				// 2. Prioritize getting the text from whichever attribute exists
				const text = target.getAttribute('title') || target.getAttribute('data-title');
				
				if (text) {
					// 3. If it has a title, move it to data-title to hide the default browser tooltip
					if (target.hasAttribute('title')) {
						target.setAttribute('data-title', text);
						target.removeAttribute('title'); 
					}
					
					// 4. Update and show your custom tooltip
					tooltip.innerText = text;
					tooltip.style.opacity = '1';
				}
			} else {
				tooltip.style.opacity = '0';
			}
		});

		document.addEventListener('mouseout', () => { 
			tooltip.style.opacity = '0'; 
		});
	}
	// Combine your startup functions here
    window.onload = async () => {
        await loadData(); // Load the CSVs first
        updatePage();     // Then run the initial calculation and UI setup
    };
</script>
</body>
</html>
