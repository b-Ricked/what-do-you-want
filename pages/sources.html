<body>
	<button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="topBtn" title="Go to top">↑</button>

    <a href="../index.html" class="back-link">← Back to Calculation Tool</a>

    <h1>Data Sources & Methodology</h1>
    <p>All calculations are based on the following publicly available data:</p>
    
    <div id="source-container">
        <p id="loading-text">Loading sources...</p>
    </div>

    <footer>
        <p>Last Updated: March 2026</p>
		<a href="../index.html" class="back-link">← Back to Calculation Tool</a>
    </footer>

</body>
<script>
    // 1. A function to safely parse CSV rows (respecting double quotes)
    function splitCSVRow(row) {
        let result = [];
        let inQuotes = false;
        let currentChunk = '';
        for (let i = 0; i < row.length; i++) {
            let char = row[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(currentChunk.trim());
                currentChunk = '';
            } else {
                currentChunk += char;
            }
        }
        result.push(currentChunk.trim());
        return result;
    }

    // 2. Fetch the CSV and build the HTML
    async function loadSources() {
            try {
                // Updated path and case-sensitivity
                const response = await fetch('../data/sources.csv');
                if (!response.ok) throw new Error("Could not find Sources.csv");
                
                const data = await response.text();
                const container = document.getElementById('source-container');
                container.innerHTML = ''; 

                const rows = data.split('\n').filter(row => row.trim() !== '');
                
                for (let i = 1; i < rows.length; i++) {
                    const columns = splitCSVRow(rows[i]);
                    
                    if (columns.length >= 2) {
                        // This regex cleans up the outer quotes and the double-double quotes ""
                        const title = columns[0].replace(/^"|"$/g, '').replace(/""/g, '"');
                        const url = columns[1].replace(/^"|"$/g, '').replace(/""/g, '"');
                        const description = columns[2] ? columns[2].replace(/^"|"$/g, '').replace(/""/g, '"') : '';

                        const sourceBlock = document.createElement('div');
                        sourceBlock.className = 'source-item';
                        
                        sourceBlock.innerHTML = `
                            <h3><a href="${url}" target="_blank" rel="noopener noreferrer">${title}</a></h3>
                            ${description ? `<p>${description}</p>` : ''}
                        `;
                        
                        container.appendChild(sourceBlock);
                    }
                }
            } catch (error) {
                document.getElementById('source-container').innerHTML = `<p>Error: ${error.message}</p>`;
                console.error('Failed to load sources:', error);
            }
        }

    // 3. Run the function when the page loads
    window.addEventListener('DOMContentLoaded', loadSources);
</script>
</html>
